<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍽️ 현정pick점메추</title>
<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    background: #FFF9E6; /* 배경 베이스 컬러 */
}

.card {
    padding-top: 50px;
    max-width: 600px;
    margin: 0 auto;
}

h1 {
    font-size: 36px;
    color: #331B05;
    margin-bottom: 5px;
}

p {
    font-size: 16px;
    color: #666;
    margin-bottom: 25px;
}

/* 탭 버튼 스타일링 */
.lunch, .dinner {
    font-size: 18px;
    font-weight: bold;
    padding: 12px 35px;
    margin: 10px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    position: relative;
    z-index: 2;
    transition: 0.2s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
.lunch:hover { transform: scale(1.05); }
.dinner:hover { transform: scale(1.05); }
.lunch { background: #ffd43b; color: #331B05; }
.dinner { background: #ff8787; color: white; }

/* 🎰 골드 슬롯머신 기계 본체 디자인 (선택 영역 재현) */
.slot-machine-frame {
    display: inline-flex;
    background: linear-gradient(145deg, #FFC033, #D49000);
    border: 8px solid #EAA816;
    border-radius: 35px;
    padding: 25px 40px;
    margin-top: 25px;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.3), 0 15px 25px rgba(0,0,0,0.15);
    position: relative;
    justify-content: center;
    align-items: center;
    min-width: 240px;
}

/* 테두리 전구 도트 라인 효과 */
.slot-machine-frame::before {
    content: '';
    position: absolute;
    top: -4px; left: -4px; right: -4px; bottom: -4px;
    border: 2px dashed white;
    border-radius: 30px;
    opacity: 0.8;
    animation: blink 0.5s infinite alternate;
}

/* 내부 슬롯 화면 디스플레이 창 */
.slot-display-window {
    width: 100%;
    background: white;
    padding: 20px 40px;
    border-radius: 15px;
    border: 5px solid #63432A;
    box-shadow: inset 0 8px 10px rgba(0,0,0,0.15);
    min-height: 90px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* 당첨 시 발광 하이라이트 애니메이션 효과 */
.slot-display-window.hit {
    border-color: #FFD43B;
    box-shadow: 0 0 25px #FFD43B, inset 0 0 10px #FFD43B;
    animation: pulse 0.5s infinite alternate;
}

/* 텍스트 렌더링 스타일 */
.food-text {
    font-size: 32px;
    font-weight: 900;
    color: #4A4A4A;
    white-space: nowrap;
}
.slot-display-window.hit .food-text {
    color: #FF3E3E;
}

/* 결과 메시지 배너 */
#result-msg {
    margin-top: 25px;
    font-size: 24px;
    font-weight: bold;
    color: #8E5A36;
    min-height: 35px;
}

/* 애니메이션 Keyframes */
@keyframes blink {
    0% { border-color: white; opacity: 0.5; }
    100% { border-color: #FFD43B; opacity: 1; }
}
@keyframes pulse {
    0% { transform: scale(1); }
    100% { transform: scale(1.03); }
}
</style>
</head>
<body>

<div class="card">
    <h1>🍽️ 현정pick점메추 🍽️</h1>
    <p>배고프면 눌러라 😋</p>

    <button class="lunch" onclick="lunch()">🍱 점메추</button>
    <button class="dinner" onclick="dinner()">🍖 저메추</button>

    <!-- 상황 상태 안내판 -->
    <div id="result-msg">🤔 메뉴를 고민중...</div>

    <!-- 🎰 디자인 복제 슬롯머신 박스 영역 -->
    <div>
        <div class="slot-machine-frame">
            <div class="slot-display-window" id="windowBox">
                <div class="food-text" id="foodDisplay">김치찌개</div>
            </div>
        </div>
    </div>
</div>

<script>
const lunchFoods = [
    "제육볶음","돈까스","국밥","김치찌개","냉면",
    "햄버거","짜장면","짬뽕","칼국수","비빔밥"
];
const dinnerFoods = [
    "치킨","피자","삼겹살","족발","닭갈비",
    "마라탕","곱창","회","떡볶이","샤브샤브"
];

let isRunning = false;

/* 🎰 슬롯 핵심 함수 (보내주신 스크립트 점진 감속 알고리즘 완벽 유지) */
function slotSpin(list, emoji, title) {
    if (isRunning) return; // 중복 클릭 방지
    isRunning = true;

    let msgBox = document.getElementById("result-msg");
    let foodDisplay = document.getElementById("foodDisplay");
    let windowBox = document.getElementById("windowBox");

    // 초기화 및 구동 중 연출
    windowBox.classList.remove("hit");
    msgBox.innerText = `⏳ 슬롯 돌아가는 중...`;

    let duration = 1600;
    let start = Date.now();

    function spin() {
        let elapsed = Date.now() - start;
        let progress = elapsed / duration;
        
        // 점점 느려지는 속도 수식 유지
        let speed = 50 + progress * 200;
        let food = list[Math.floor(Math.random() * list.length)];
        
        foodDisplay.innerText = food;

        if (elapsed < duration) {
            setTimeout(spin, speed);
        } else {
            // 최종 정지 및 당첨 연출
            let final = list[Math.floor(Math.random() * list.length)];
            foodDisplay.innerText = `✨ ${final} ✨`;
            msgBox.innerText = `${emoji} ${title}`;
            
            // 디자인 시각 효과(노란 전광판 점등) 추가
            windowBox.classList.add("hit");
            isRunning = false;
        }
    }
    spin();
}

function lunch() {
    slotSpin(lunchFoods, "🍱", "오늘의 점심은!");
}

function dinner() {
    slotSpin(dinnerFoods, "🍖", "오늘의 저녁은!");
}
</script>
</body>
</html>
